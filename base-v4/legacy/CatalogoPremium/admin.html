<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Comercial | Z Automotiva</title>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="theme-color" content="#020617"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./catalogo-gerado/assets/catalog.css"/>
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header">
      <div class="admin-title">
        <h1>Dashboard Comercial</h1>
        <p>Pedidos enviados, buscas, consultores, marcas e produtos em destaque do catálogo.</p>
      </div>
      <form class="admin-controls" id="filters">
        <select id="range" aria-label="Período">
          <option value="24h">Últimas 24h</option>
          <option value="7d">Últimos 7 dias</option>
          <option value="30d" selected>Últimos 30 dias</option>
          <option value="90d">Últimos 90 dias</option>
          <option value="all">Tudo</option>
        </select>
        <input id="catalogId" placeholder="Catálogo opcional"/>
        <input id="consultorId" placeholder="Consultor opcional"/>
        <input id="token" placeholder="Token admin opcional"/>
        <button type="submit">Atualizar</button>
      </form>
    </header>

    <div id="message"></div>

    <section class="admin-kpis" id="kpis"></section>

    <section class="admin-grid">
      <article class="admin-card">
        <h2>📈 Movimento diário</h2>
        <div id="timeline" class="admin-timeline"></div>
      </article>

      <article class="admin-card">
        <h2>🔥 Produtos mais pedidos</h2>
        <div id="topProducts" class="admin-list"></div>
      </article>

      <article class="admin-card">
        <h2>🔎 Buscas mais feitas</h2>
        <div id="topSearches" class="admin-list"></div>
      </article>

      <article class="admin-card">
        <h2>⚠️ Pesquisas sem resultado</h2>
        <div id="noResultSearches" class="admin-list"></div>
      </article>

      <article class="admin-card">
        <h2>👤 Consultores</h2>
        <div id="consultants" class="admin-list"></div>
      </article>

      <article class="admin-card">
        <h2>🏷️ Marcas</h2>
        <div id="brands" class="admin-list"></div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function fmt(value) {
      return new Intl.NumberFormat('pt-BR').format(Number(value || 0));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function paramsFromForm() {
      const params = new URLSearchParams();
      params.set('range', $('range').value || '30d');
      if ($('catalogId').value.trim()) params.set('catalogId', $('catalogId').value.trim());
      if ($('consultorId').value.trim()) params.set('consultorId', $('consultorId').value.trim());
      if ($('token').value.trim()) params.set('token', $('token').value.trim());
      return params;
    }

    function renderKpis(totals) {
      const items = [
        ['Eventos', totals.events],
        ['Acessos', totals.views],
        ['Buscas', totals.searches],
        ['Peças adicionadas', totals.addToCart],
        ['Peças enviadas WhatsApp', totals.whatsapp],
        ['Não encontrados', totals.notFound],
      ];
      $('kpis').innerHTML = items.map(([label, value]) => `
        <div class="admin-kpi">
          <span>${escapeHtml(label)}</span>
          <strong>${fmt(value)}</strong>
        </div>
      `).join('');
    }

    function renderList(id, rows, empty, mapper) {
      const el = $(id);
      const list = Array.isArray(rows) ? rows : [];
      if (!list.length) {
        el.innerHTML = `<p class="admin-muted">${escapeHtml(empty)}</p>`;
        return;
      }
      el.innerHTML = list.map(mapper).join('');
    }

    function renderTimeline(rows) {
      const el = $('timeline');
      const list = Array.isArray(rows) ? rows : [];
      if (!list.length) {
        el.innerHTML = '<p class="admin-muted">Sem dados no período.</p>';
        return;
      }
      const max = Math.max(...list.map((item) => Number(item.events || 0)), 1);
      el.innerHTML = list.slice(-30).map((item) => {
        const height = Math.max(8, Math.round((Number(item.events || 0) / max) * 126));
        const label = `${item.date}: ${fmt(item.events)} eventos`;
        return `<div class="admin-bar" data-label="${escapeHtml(label)}" style="height:${height}px"></div>`;
      }).join('');
    }

    function render(data) {
      if (data.warning || data.reason || data.stored === false) {
        $('message').innerHTML = `<div class="admin-warning">${escapeHtml(data.warning || data.reason || 'Banco ainda não configurado.')}</div>`;
      } else {
        $('message').innerHTML = '';
      }

      renderKpis(data.totals || {});
      renderTimeline(data.timeline || []);

      renderList('topProducts', data.topProducts, 'Nenhum produto registrado ainda.', (p) => `
        <div class="admin-row">
          <span>
            <b>${escapeHtml(p.cod || p.codFab || 'Código')}</b>
            <small>${escapeHtml(p.nome || '')}</small>
          </span>
          <em>${fmt(p.total)}</em>
        </div>
      `);

      renderList('topSearches', data.topSearches, 'Nenhuma busca registrada ainda.', (p) => `
        <div class="admin-row"><b>${escapeHtml(p.query || p.key)}</b><em>${fmt(p.total)}</em></div>
      `);

      renderList('noResultSearches', data.noResultSearches, 'Nenhuma busca sem resultado registrada.', (p) => `
        <div class="admin-row"><b>${escapeHtml(p.query || p.key)}</b><em>${fmt(p.total)}</em></div>
      `);

      renderList('consultants', data.consultants, 'Nenhum consultor registrado ainda.', (p) => `
        <div class="admin-row"><b>${escapeHtml(p.key)}</b><em>${fmt(p.total)}</em></div>
      `);

      renderList('brands', data.brands, 'Nenhuma marca registrada ainda.', (p) => `
        <div class="admin-row"><b>${escapeHtml(p.marca || p.key)}</b><em>${fmt(p.total)}</em></div>
      `);
    }

    async function loadDashboard() {
      $('message').innerHTML = '<p class="admin-muted">Carregando dados...</p>';
      try {
        const response = await fetch(`/api/dashboard?${paramsFromForm().toString()}`, {
          headers: { Accept: 'application/json' },
        });
        const data = await response.json();
        if (!response.ok || data.ok === false) {
          throw new Error(data.details || data.error || 'Falha ao carregar dashboard.');
        }
        render(data);
      } catch (error) {
        $('message').innerHTML = `<div class="admin-error">${escapeHtml(error.message || error)}</div>`;
      }
    }

    $('filters').addEventListener('submit', (event) => {
      event.preventDefault();
      loadDashboard();
    });

    const url = new URL(window.location.href);
    if (url.searchParams.get('token')) $('token').value = url.searchParams.get('token');
    if (url.searchParams.get('range')) $('range').value = url.searchParams.get('range');
    if (url.searchParams.get('catalogId')) $('catalogId').value = url.searchParams.get('catalogId');
    if (url.searchParams.get('consultorId')) $('consultorId').value = url.searchParams.get('consultorId');

    loadDashboard();
  </script>
</body>
</html>
